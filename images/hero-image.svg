<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="20"/>
  
  <!-- Main Document Card -->
  <rect x="50" y="80" width="200" height="250" fill="url(#cardGradient)" rx="15" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Document Lines -->
  <rect x="70" y="110" width="160" height="3" fill="#0d6efd" opacity="0.7"/>
  <rect x="70" y="125" width="140" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="135" width="150" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="145" width="130" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="155" width="145" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="165" width="120" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="175" width="155" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="185" width="135" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="195" width="140" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="205" width="125" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="215" width="150" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="225" width="130" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="235" width="145" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="245" width="120" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="255" width="155" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="265" width="135" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="275" width="140" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="285" width="125" height="2" fill="#6c757d" opacity="0.5"/>
  <rect x="70" y="295" width="150" height="2" fill="#6c757d" opacity="0.5"/>
  
  <!-- Document Title -->
  <text x="150" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d6efd">TCC</text>
  
  <!-- AI Brain Icon -->
  <circle cx="350" cy="120" r="40" fill="url(#iconGradient)" stroke="#ffffff" stroke-width="3"/>
  <path d="M330 120 Q350 100 370 120 Q350 140 330 120" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="340" cy="115" r="2" fill="#ffffff"/>
  <circle cx="360" cy="115" r="2" fill="#ffffff"/>
  <circle cx="350" cy="125" r="2" fill="#ffffff"/>
  <circle cx="345" cy="130" r="2" fill="#ffffff"/>
  <circle cx="355" cy="130" r="2" fill="#ffffff"/>
  
  <!-- APA Citation Icon -->
  <rect x="320" y="200" width="60" height="80" fill="url(#cardGradient)" rx="8" stroke="#ffffff" stroke-width="2"/>
  <text x="350" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0d6efd">APA</text>
  <text x="350" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">7ª Edição</text>
  <rect x="325" y="245" width="50" height="2" fill="#ffc107"/>
  <rect x="325" y="250" width="45" height="1" fill="#6c757d" opacity="0.5"/>
  <rect x="325" y="255" width="50" height="1" fill="#6c757d" opacity="0.5"/>
  <rect x="325" y="260" width="40" height="1" fill="#6c757d" opacity="0.5"/>
  <rect x="325" y="265" width="50" height="1" fill="#6c757d" opacity="0.5"/>
  
  <!-- Progress Bar -->
  <rect x="320" y="320" width="60" height="8" fill="#e9ecef" rx="4"/>
  <rect x="320" y="320" width="45" height="8" fill="#ffc107" rx="4"/>
  <text x="350" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">75%</text>
  
  <!-- Floating Elements -->
  <circle cx="450" cy="100" r="15" fill="#ffffff" opacity="0.3"/>
  <circle cx="480" cy="150" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="420" cy="180" r="12" fill="#ffffff" opacity="0.25"/>
  <circle cx="470" cy="220" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="430" cy="250" r="14" fill="#ffffff" opacity="0.2"/>
  
  <!-- Connection Lines -->
  <line x1="350" y1="160" x2="450" y2="100" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="160" x2="480" y2="150" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="160" x2="420" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  
  <!-- Success Checkmark -->
  <circle cx="500" cy="80" r="20" fill="#28a745" opacity="0.8"/>
  <path d="M490 80 L495 85 L510 70" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 47 Days Badge -->
  <rect x="450" y="280" width="80" height="30" fill="#ffc107" rx="15" stroke="#ffffff" stroke-width="2"/>
  <text x="490" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000000">47 Dias</text>
</svg> 